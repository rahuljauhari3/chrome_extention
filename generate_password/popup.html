<!DOCTYPE html>
<html>
<head>
  <title>Password Generator</title>
  <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
  <h1>Password Generator</h1>
  
  <!-- Tab navigation for Generate and History -->
  <div class="tab">
    <button class="tablinks" id="generateTab">Generate</button>
    <button class="tablinks" id="historyTab">History</button>
  </div>
  
  <!-- Generate Tab -->
  <div id="Generate" class="tabcontent">
    <label for="length">Password Length:</label>
    <input type="range" id="length" min="8" max="20" value="12">
    <span id="lengthValue">12</span>

    <label for="basePhrase">Enter a base phrase (optional):</label>
    <input type="text" id="basePhrase" placeholder="e.g., MySecret123" />

    <input type="text" id="password" readonly placeholder="e.g., Password@123" />
    <button id="generate">Generate Password</button>
    <button id="copy">Copy</button>
  </div>
  
  <!-- History Tab -->
  <div id="History" class="tabcontent">
    <h2>Generated Passwords</h2>
    <ul id="historyList"></ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>
