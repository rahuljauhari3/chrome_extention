<!DOCTYPE html>
<html>
<head>
  <title>Password Generator</title>
  <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
  <h1>Password Generator</h1>
  
  <!-- Password Length Selector -->
  <label for="length">Password Length:</label>
  <input type="range" id="length" min="8" max="20" value="12">
  <span id="lengthValue">12</span>

  <!-- Optional: Base Phrase for Password -->
  <label for="basePhrase">Enter a base phrase (optional):</label>
  <input type="text" id="basePhrase" placeholder="e.g., MySecret123" />

  <!-- Password Display and Controls -->
  <input type="text" id="password" readonly />
  <button id="generate">Generate Password</button>
  <button id="copy">Copy</button>
  
  <script src="popup.js"></script>
</body>
</html>
