<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <link rel="stylesheet" href="styles.css">  
    <title>Stock Screener</title>  
</head>  
<body>  
    <div class="container">  
        <h1>Stock Screener</h1>  
        <label for="ebita">EBITA:</label>  
        <input type="text" id="ebita" placeholder="Enter EBITA %">  
          
        <label for="pat">PAT:</label>  
        <input type="text" id="pat" placeholder="Enter PAT %">  
          
        <label for="cager">CAGER:</label>  
        <input type="text" id="cager" placeholder="Enter CAGER %">  
          
        <button id="search">Search</button>  
          
        <h2>Stocks Price Change</h2>  
        <div id="results"></div>  
    </div>  
    <script src="popup.js"></script>  
</body>  
</html>
